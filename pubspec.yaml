name: iot_device_manager
description: "IoT Device Management SaaS Platform - Monitor and control IoT devices remotely"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.0
  
  # State Management
  provider: ^6.1.2
  
  # UI/UX
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  
  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true